<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donar con PayPal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6f9fc, #e9f0f5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 36px;
            padding: 36px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        }
        header {
            text-align: center;
            margin-bottom: 28px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0a2a44;
        }
        header p {
            color: #5b6f82;
            font-size: 15px;
            margin-top: 4px;
        }
        .box {
            background: #fafcff;
            border-radius: 24px;
            padding: 24px 20px 20px;
            border: 1px solid #e9edf2;
        }
        .currency-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .currency-btn {
            flex: 1;
            padding: 12px 0;
            border: 2px solid #dce2ea;
            border-radius: 60px;
            background: transparent;
            font-weight: 600;
            color: #4a5b6e;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .currency-btn.activo {
            border-color: #0070ba;
            background: #0070ba;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.25);
        }
        .amount-input {
            margin-bottom: 24px;
        }
        .amount-input label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1f3349;
            margin-bottom: 6px;
        }
        .amount-input input {
            width: 100%;
            padding: 14px 18px;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #dce2ea;
            border-radius: 60px;
            text-align: center;
            outline: none;
            font-family: inherit;
            transition: border 0.2s;
        }
        .amount-input input:focus {
            border-color: #0070ba;
            box-shadow: 0 0 0 4px rgba(0, 112, 186, 0.12);
        }
        #paypal-button-container {
            margin-top: 8px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .mensaje-depuracion {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            width: 100%;
        }
        .mensaje-depuracion.cargando {
            background: #eef3f8;
            color: #2c3e50;
        }
        .mensaje-depuracion.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .mensaje-depuracion.exito {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #7b8fa3;
            border-top: 1px solid #eef3f8;
            padding-top: 20px;
        }
        .footer span { margin-right: 6px; }
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            header h1 { font-size: 24px; }
            .currency-btn { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>💙 Apóyanos</h1>
            <p>Elige moneda y cantidad, luego haz clic en el botón de PayPal.</p>
        </header>

        <div class="box">
            <div class="currency-selector">
                <button class="currency-btn activo" data-currency="EUR">🇪🇺 EUR</button>
                <button class="currency-btn" data-currency="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-currency="MXN">🇲🇽 MXN</button>
            </div>

            <div class="amount-input">
                <label for="amount">Cantidad a donar</label>
                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" value="10.00" />
            </div>

            <!-- Contenedor del botón + mensajes de depuración -->
            <div id="paypal-button-container">
                <div id="depuracion" class="mensaje-depuracion cargando">
                    ⏳ Cargando PayPal...
                </div>
            </div>
        </div>

        <div class="footer">
            <span>🔒</span> Pagos seguros · PayPal
        </div>
    </div>

    <!-- SDK DE PAYPAL CON TU CLIENT-ID -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAKWAcerKo-Sa0MtDQKoUrWQzdaLWnWokdOf0wfgAD1jFl_empEwpQuMqz7DFOXQCMolgGgQ2wgHsbQ-I&currency=EUR&intent=capture">
    </script>

    <script>
        // ---- Referencias ----
        const currencyButtons = document.querySelectorAll('.currency-btn');
        const amountInput = document.getElementById('amount');
        const container = document.getElementById('paypal-button-container');
        const depuracion = document.getElementById('depuracion');

        let selectedCurrency = 'EUR';

        // ---- Función para mostrar mensajes de depuración ----
        function mostrarMensaje(texto, tipo) {
            depuracion.textContent = texto;
            depuracion.className = 'mensaje-depuracion ' + tipo;
        }

        // ---- Función principal para renderizar el botón ----
        function renderPayPalButton() {
            // 1. Validar que el SDK de PayPal está disponible
            if (typeof paypal === 'undefined') {
                mostrarMensaje('❌ El SDK de PayPal no se cargó. Revisa tu conexión a Internet o el Client ID.', 'error');
                return;
            }

            // 2. Validar el monto
            let amount = parseFloat(amountInput.value);
            if (isNaN(amount) || amount <= 0) {
                mostrarMensaje('⚠️ Ingresa un monto válido mayor a 0', 'error');
                return;
            }

            // 3. Limpiar el contenedor (borrar mensaje anterior)
            container.innerHTML = '';

            // 4. Mostrar mensaje "Creando botón..."
            const msg = document.createElement('div');
            msg.className = 'mensaje-depuracion cargando';
            msg.textContent = '⏳ Creando botón de PayPal...';
            container.appendChild(msg);

            try {
                // 5. Renderizar el botón de PayPal
                paypal.Buttons({
                    style: {
                        layout: 'vertical',
                        color: 'blue',
                        shape: 'pill',
                        label: 'donate',
                    },
                    createOrder: function(data, actions) {
                        return actions.order.create({
                            intent: 'CAPTURE',
                            purchase_units: [{
                                amount: {
                                    currency_code: selectedCurrency,
                                    value: amount.toFixed(2)
                                },
                                description: 'Donación voluntaria'
                            }],
                            application_context: {
                                shipping_preference: 'NO_SHIPPING'
                            }
                        });
                    },
                    onApprove: function(data, actions) {
                        return actions.order.capture().then(function(details) {
                            alert('✅ ¡Donación completada! Gracias ' + details.payer.name.given_name);
                            // window.location.href = 'gracias.html';
                        });
                    },
                    onError: function(err) {
                        console.error('Error de PayPal:', err);
                        mostrarMensaje('❌ Error al procesar el pago. Revisa la consola (F12).', 'error');
                    }
                }).render(container)
                .then(function() {
                    // El botón se renderizó correctamente
                    // Eliminar el mensaje de "creando" porque el botón ya está
                    const msgCargando = container.querySelector('.mensaje-depuracion');
                    if (msgCargando) msgCargando.remove();
                    // Mostrar mensaje de éxito (opcional)
                    const exito = document.createElement('div');
                    exito.className = 'mensaje-depuracion exito';
                    exito.textContent = '✅ Botón listo. Haz clic para donar.';
                    container.appendChild(exito);
                    // Ocultar el mensaje de éxito después de 3 segundos
                    setTimeout(() => { exito.style.display = 'none'; }, 3000);
                })
                .catch(function(err) {
                    console.error('Error al renderizar:', err);
                    mostrarMensaje('❌ Error al crear el botón: ' + err.message, 'error');
                });

            } catch (err) {
                console.error('Excepción:', err);
                mostrarMensaje('❌ Error inesperado: ' + err.message, 'error');
            }
        }

        // ---- Eventos ----
        currencyButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                currencyButtons.forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');
                selectedCurrency = this.dataset.currency;
                renderPayPalButton();
            });
        });

        amountInput.addEventListener('input', function() {
            renderPayPalButton();
        });

        // ---- Cargar al inicio ----
        // Esperamos un poco para asegurar que el SDK se cargue
        setTimeout(renderPayPalButton, 500);
    </script>

</body>
</html>
