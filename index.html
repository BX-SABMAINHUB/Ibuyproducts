<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donar con PayPal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6f9fc, #e9f0f5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 36px;
            padding: 36px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        }
        header {
            text-align: center;
            margin-bottom: 28px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0a2a44;
        }
        header p {
            color: #5b6f82;
            font-size: 15px;
            margin-top: 4px;
        }
        .box {
            background: #fafcff;
            border-radius: 24px;
            padding: 24px 20px 20px;
            border: 1px solid #e9edf2;
        }
        .currency-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .currency-btn {
            flex: 1;
            padding: 12px 0;
            border: 2px solid #dce2ea;
            border-radius: 60px;
            background: transparent;
            font-weight: 600;
            color: #4a5b6e;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .currency-btn.activo {
            border-color: #0070ba;
            background: #0070ba;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.25);
        }
        .currency-btn.activo:hover {
            background: #005c9e;
        }
        .amount-input {
            margin-bottom: 24px;
        }
        .amount-input label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1f3349;
            margin-bottom: 6px;
        }
        .amount-input input {
            width: 100%;
            padding: 14px 18px;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #dce2ea;
            border-radius: 60px;
            text-align: center;
            outline: none;
            font-family: inherit;
            transition: border 0.2s;
        }
        .amount-input input:focus {
            border-color: #0070ba;
            box-shadow: 0 0 0 4px rgba(0, 112, 186, 0.12);
        }
        #paypal-button-container {
            margin-top: 8px;
            min-height: 110px;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #7b8fa3;
            border-top: 1px solid #eef3f8;
            padding-top: 20px;
        }
        .footer span {
            margin-right: 6px;
        }
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            header h1 { font-size: 24px; }
            .currency-btn { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>💙 Apóyanos</h1>
            <p>Elige moneda y cantidad, luego haz clic en el botón de PayPal.</p>
        </header>

        <div class="box">
            <!-- Selector de moneda -->
            <div class="currency-selector">
                <button class="currency-btn activo" data-currency="EUR">🇪🇺 EUR</button>
                <button class="currency-btn" data-currency="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-currency="MXN">🇲🇽 MXN</button>
            </div>

            <!-- Campo de monto -->
            <div class="amount-input">
                <label for="amount">Cantidad a donar</label>
                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" value="10.00" />
            </div>

            <!-- Contenedor del botón de PayPal (se renderiza aquí) -->
            <div id="paypal-button-container"></div>
        </div>

        <div class="footer">
            <span>🔒</span> Pagos seguros · PayPal
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- SDK de PayPal (Checkout) - Carga la librería                -->
    <!-- ========================================================== -->
    <script src="https://www.paypal.com/sdk/js?client-id=TU_CLIENT_ID&currency=EUR&intent=donation"></script>

    <script>
        // ---- 1. Obtener referencias a los elementos ----
        const currencyButtons = document.querySelectorAll('.currency-btn');
        const amountInput = document.getElementById('amount');
        const container = document.getElementById('paypal-button-container');

        let selectedCurrency = 'EUR'; // por defecto

        // ---- 2. Lógica para cambiar moneda ----
        currencyButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Cambiar estilo
                currencyButtons.forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');

                // Guardar la moneda seleccionada
                selectedCurrency = this.dataset.currency;

                // **IMPORTANTE**: El botón de PayPal se debe re-renderizar con la nueva moneda
                renderPayPalButton();
            });
        });

        // ---- 3. Función que renderiza (o re-renderiza) el botón de PayPal ----
        function renderPayPalButton() {
            // Limpiar el contenedor
            container.innerHTML = '';

            // Obtener el monto actual (si es inválido, usamos 0)
            let amount = parseFloat(amountInput.value);
            if (isNaN(amount) || amount <= 0) {
                // Si no es válido, mostramos un mensaje o deshabilitamos el botón
                container.innerHTML = '<p style="color:#b91c1c; font-weight:500; text-align:center;">Ingresa un monto válido</p>';
                return;
            }

            // Crear el botón de PayPal con la configuración dinámica
            paypal.Buttons({
                // Tipo de transacción: donación
                style: {
                    layout: 'vertical',
                    color: 'blue',
                    shape: 'pill',
                    label: 'donate',
                },
                // Crear la orden con el monto y moneda seleccionados
                createOrder: function(data, actions) {
                    return actions.order.create({
                        intent: 'CAPTURE', // para donaciones también se usa CAPTURE
                        purchase_units: [{
                            amount: {
                                currency_code: selectedCurrency,
                                value: amount.toFixed(2) // dos decimales
                            },
                            description: 'Donación voluntaria'
                        }],
                        application_context: {
                            shipping_preference: 'NO_SHIPPING'
                        }
                    });
                },
                // Cuando se aprueba el pago, redirige a la página de éxito (opcional)
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        // Aquí puedes redirigir a una página de gracias
                        alert('¡Donación completada! Gracias ' + details.payer.name.given_name);
                        // O redirigir: window.location.href = 'gracias.html';
                    });
                },
                // Si hay error
                onError: function(err) {
                    console.error(err);
                    alert('Ocurrió un error. Intenta de nuevo.');
                }
            }).render(container);
        }

        // ---- 4. Cuando el usuario cambie el monto, re-renderizamos ----
        amountInput.addEventListener('input', function() {
            renderPayPalButton();
        });

        // ---- 5. Renderizar el botón al cargar la página ----
        renderPayPalButton();
    </script>

</body>
</html>
